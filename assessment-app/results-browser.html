<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeapYear Results Browser</title>
<link rel="icon" href="https://cdn.prod.website-files.com/67d4936e49a6f8c99c6f200f/67d4bd9d4c6b42259b3b58c5_favicon.png" type="image/png">
<link rel="stylesheet" href="https://use.typekit.net/gxr6ytx.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ly-night: #071411;
    --ly-alabaster: #F5F1EB;
    --ly-brunswick-green: #354A3D;
    --ly-dark-green: #17322D;
    --ly-flame: #DD5E32;
    --ly-sandy-brown: #F1AA5F;
    --ly-neutral-900: #1B1918;
    --ly-neutral-800: #393634;
    --ly-neutral-700: #595755;
    --ly-neutral-500: #82807E;
    --ly-neutral-300: #C0BDBB;
    --ly-neutral-200: #DDDBD9;
    --ly-neutral-100: #F1EFEC;
    --ly-font-display: 'neulis-neue', sans-serif;
    --ly-font-body: 'area-normal', sans-serif;
  }

  html { font-size: 16px; }
  body {
    font-family: var(--ly-font-body);
    font-weight: 400;
    background: var(--ly-alabaster);
    color: var(--ly-neutral-800);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== PICKER ===== */
  .picker-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--ly-dark-green);
    padding: 1rem 1.5rem;
    border-bottom: 1px solid rgba(245,241,235,0.1);
  }
  .picker-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1rem;
  }
  .picker-label {
    font-family: var(--ly-font-body);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(245,241,235,0.5);
    flex-shrink: 0;
  }
  .picker-group {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .picker-btn {
    font-family: var(--ly-font-body);
    font-size: 0.8rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid rgba(245,241,235,0.2);
    background: transparent;
    color: rgba(245,241,235,0.7);
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .picker-btn:hover {
    border-color: rgba(245,241,235,0.4);
    color: var(--ly-alabaster);
  }
  .picker-btn.active-primary {
    background: var(--ly-flame);
    border-color: var(--ly-flame);
    color: #fff;
  }
  .picker-btn.active-secondary {
    background: var(--ly-brunswick-green);
    border-color: rgba(245,241,235,0.3);
    color: var(--ly-alabaster);
  }
  .picker-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }
  .picker-divider {
    width: 1px;
    height: 28px;
    background: rgba(245,241,235,0.15);
    flex-shrink: 0;
  }
  .picker-current {
    font-family: var(--ly-font-display);
    font-size: 1rem;
    font-weight: 600;
    color: var(--ly-alabaster);
    margin-left: auto;
    flex-shrink: 0;
  }
  .toggle-row {
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }
  .toggle-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: rgba(245,241,235,0.5);
  }
  .toggle-check {
    accent-color: var(--ly-flame);
    cursor: pointer;
  }

  /* ===== RESULTS DISPLAY ===== */
  .results-hero {
    background: var(--ly-dark-green);
    color: var(--ly-alabaster);
    text-align: center;
    padding: 3rem 1.5rem 3.5rem;
  }
  .results-hero .result-label {
    font-family: var(--ly-font-body);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: rgba(245,241,235,0.5);
    margin-bottom: 1rem;
  }
  .results-hero .result-type {
    font-family: var(--ly-font-display);
    font-size: 2.75rem;
    font-weight: 700;
    color: var(--ly-alabaster);
    letter-spacing: -0.02em;
    line-height: 1.2;
    text-wrap: balance;
  }
  .results-hero .result-flags {
    margin-top: 1rem;
    font-family: var(--ly-font-body);
    font-style: italic;
    font-size: 0.95rem;
    color: rgba(245,241,235,0.6);
  }

  .results-content {
    max-width: 640px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }
  .result-section {
    margin-bottom: 3rem;
  }
  .result-section h2 {
    font-family: var(--ly-font-display);
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ly-night);
    margin-bottom: 1rem;
    line-height: 1.25;
  }
  .result-section h3 {
    font-family: var(--ly-font-display);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--ly-brunswick-green);
    margin-bottom: 0.75rem;
  }
  .result-section p, .result-section .narrative {
    font-size: 1rem;
    line-height: 1.75;
    color: var(--ly-neutral-700);
  }
  .result-section .narrative p { margin-bottom: 1.1rem; }
  .section-intro {
    font-style: italic;
    color: var(--ly-neutral-500);
    margin-bottom: 1.25rem;
    font-size: 0.95rem;
    line-height: 1.65;
  }
  .result-flag-block {
    margin-top: 1.5rem;
    padding: 1.5rem;
    background: var(--ly-neutral-100);
    border-radius: 10px;
    border-left: 3px solid var(--ly-sandy-brown);
  }
  .result-flag-block h3 {
    font-family: var(--ly-font-display);
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--ly-night);
    margin-bottom: 0.5rem;
  }
  .result-flag-block p {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--ly-neutral-700);
  }
  .mindset-indicator {
    margin: 1rem 0 1.25rem;
  }
  .mindset-label {
    display: inline-block;
    font-family: var(--ly-font-body);
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 6px 16px;
    border-radius: 20px;
    background: var(--ly-brunswick-green);
    color: var(--ly-alabaster);
  }
  .separator {
    width: 48px;
    height: 2px;
    background: var(--ly-neutral-200);
    margin: 2.5rem 0;
  }
  .result-bridge {
    margin-top: 3rem;
    padding: 2.5rem;
    background: var(--ly-dark-green);
    border-radius: 12px;
    color: var(--ly-alabaster);
  }
  .result-bridge h2 {
    font-family: var(--ly-font-display);
    color: var(--ly-alabaster);
    margin-bottom: 1rem;
  }
  .result-bridge p {
    font-size: 1rem;
    line-height: 1.75;
    color: rgba(245,241,235,0.8);
  }

  /* All pairings grid */
  .all-pairings {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }
  .all-pairings h2 {
    font-family: var(--ly-font-display);
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ly-night);
    margin-bottom: 0.5rem;
  }
  .all-pairings .subtitle {
    font-size: 0.95rem;
    color: var(--ly-neutral-500);
    margin-bottom: 2rem;
  }
  .pairing-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.6rem;
  }
  .pairing-card {
    padding: 14px 18px;
    background: var(--ly-neutral-100);
    border-radius: 10px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .pairing-card:hover {
    border-color: var(--ly-neutral-300);
    background: #EBE7E1;
  }
  .pairing-card .pairing-name {
    font-family: var(--ly-font-display);
    font-size: 1rem;
    font-weight: 600;
    color: var(--ly-night);
    margin-bottom: 2px;
  }
  .pairing-card .pairing-drives {
    font-size: 0.8rem;
    color: var(--ly-neutral-500);
  }

  @media (max-width: 600px) {
    .picker-inner { flex-direction: column; align-items: flex-start; }
    .picker-current { margin-left: 0; }
    .picker-divider { display: none; }
    .results-hero .result-type { font-size: 2.15rem; }
    .pairing-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="picker-bar">
  <div class="picker-inner">
    <span class="picker-label">Primary</span>
    <div class="picker-group" id="primary-btns"></div>
    <div class="picker-divider"></div>
    <span class="picker-label">Secondary</span>
    <div class="picker-group" id="secondary-btns"></div>
    <div class="picker-divider"></div>
    <div class="toggle-row">
      <input type="checkbox" id="toggle-balanced" class="toggle-check">
      <label for="toggle-balanced" class="toggle-label">Balanced</label>
      <input type="checkbox" id="toggle-renaissance" class="toggle-check">
      <label for="toggle-renaissance" class="toggle-label">Renaissance</label>
    </div>
    <div class="picker-divider"></div>
    <span class="picker-label">Mindset</span>
    <div class="picker-group" id="mindset-btns"></div>
  </div>
</div>

<div id="result-display"></div>

<script>
const ARCHETYPES = ['philosopher','explorer','builder','organizer','analyst','connector','mobilizer','creator'];

const ORIENTATIONS = {
  thinking: ['philosopher','analyst'],
  doing: ['builder','organizer'],
  relating: ['connector','mobilizer'],
  experiencing: ['explorer','creator']
};

function getOrientation(a) {
  for (const [o, list] of Object.entries(ORIENTATIONS)) {
    if (list.includes(a)) return o;
  }
  return null;
}

const TENSION_MAP = {
  'doing+thinking':'action_vs_reflection','doing+relating':'output_vs_people',
  'doing+experiencing':'structure_vs_freedom','relating+thinking':'ideas_vs_relationships',
  'experiencing+thinking':'depth_vs_breadth','experiencing+relating':'community_vs_independence',
  'thinking+thinking':'theory_vs_systems','doing+doing':'vision_vs_execution',
  'relating+relating':'depth_vs_breadth_relational','experiencing+experiencing':'inner_vs_outer'
};

function getTension(p, s) {
  const pair = [getOrientation(p), getOrientation(s)].sort().join('+');
  return TENSION_MAP[pair] || 'action_vs_reflection';
}

// Sample shadow modifiers based on archetype tendencies
const SAMPLE_SHADOWS = {
  philosopher: ['intellect_high','imagination_high','assertiveness_low'],
  explorer: ['orderliness_low','gregariousness_high','selfDiscipline_low'],
  builder: ['vulnerability_low','selfDiscipline_high','cooperation_low'],
  organizer: ['orderliness_high','selfDiscipline_high','imagination_low'],
  analyst: ['intellect_high','orderliness_high','cooperation_low'],
  connector: ['cooperation_high','assertiveness_low','selfConsciousness_high'],
  mobilizer: ['assertiveness_high','gregariousness_high','cooperation_low'],
  creator: ['imagination_high','artisticInterests_high','orderliness_low']
};

const C = {"primaryNarratives":{"philosopher":{"archetype":"Philosopher","orientation":"thinking","coreDrive":"understanding life","narrative":"You're driven by the big fundamental questions of life. While other people around you are talking about things that sometimes feel trivial \u2014 what they're wearing, what show they've been watching \u2014 your mind is somewhere else entirely. You're asking questions like: Why are humans the way that they are? What does it mean to live a life well? Where does ultimate truth come from, and how do we know when we've found it?\n\nYou're reflective, abstract, contemplative. You see connections between ideas that other people miss, and you're drawn to the conversations that go deep \u2014 the ones that make everyone else uncomfortable because there's no quick answer.\n\nYour strength is depth of thought. You can hold complexity that would overwhelm most people, and you're not afraid to sit in the tension of a question that doesn't have a neat resolution. You connect big ideas across disciplines and time periods in ways that genuinely illuminate something.\n\nBut here's your shadow: analysis paralysis. The size of the problems you see in the world can feel overwhelming. You can get so lost in understanding that you never move to action. The questions matter \u2014 but at some point, you have to step into the world with an incomplete answer and live it out."},"explorer":{"archetype":"Explorer","orientation":"experiencing","coreDrive":"experiencing the world","narrative":"You're driven by an insatiable curiosity. People, food, places \u2014 these things come alive to you in a way that it seems like your friends don't even get. You want to taste everything, meet everyone, go everywhere. But here's the thing that makes you different from just an adrenaline junkie: being present is at the core of your desires. Wherever you go, you want to actually be there. Whoever you meet, you want to genuinely know them.\n\nLiving in the moment is your specialty. It's where you come alive.\n\nThe hard part is that the world is so big. There are so many people and so many experiences that sometimes your drive to experience it all overwhelms your ability to be present to any one thing. Your core tension is fighting between staying in the moment and the FOMO that naturally comes with wanting to experience everything.\n\nYou're a natural experimenter. You learn by doing, not by reading about it. And people feel seen around you \u2014 because you're actually paying attention, actually curious about who they are. That's a rare gift. Your shadow is a lack of direction and commitment. Starting comes easily. Staying is the harder thing."},"builder":{"archetype":"Builder","orientation":"doing","coreDrive":"making things real","narrative":"You're driven by the deeply satisfying feeling of taking something from idea to reality. Not just getting things done \u2014 anyone can check a box. You want to make things real. A messy, abstract idea becomes a working system. A vision becomes a deliverable that actually ships. Something that didn't exist before now does, because you built it.\n\nYou're the person who sees a gap between what is and what could be \u2014 and your instinct isn't to theorize about it or rally people around it. It's to roll up your sleeves and close that gap. You love execution. You love craftsmanship. You love the feeling of a thing that works.\n\nWhen you're connected to a bigger vision, you're unstoppable. You want to be part of something that matters, and you bring it to life through the quality of your work. Laziness and distraction are things you genuinely don't understand in other people, and if you ever feel like someone might label you as lazy, it brings up real shame \u2014 because your identity is deeply tied to what you produce.\n\nThat's your shadow. You can start to believe that you are what you do. Feedback on your work feels personal \u2014 because it is personal to you. Learning to separate your worth from your output is one of the most important things you'll ever do. You're not your resume. You're not your deliverables. You're a person who happens to be extraordinarily good at making things real."},"organizer":{"archetype":"Organizer","orientation":"doing","coreDrive":"bringing order to chaos","narrative":"You look at the world around you and you see a place full of disrupted chaos \u2014 and your excitement comes from putting it together in a way that makes sense. Whether it's numbers or artistic endeavors, plans or people's messy lives, you're the one who sees the structure that should exist and builds it.\n\nYou love helping a team put together a plan, organize messy notes, create systems that actually work. Even closets. There's a deep satisfaction in taking something disordered and giving it shape.\n\nWhen things don't go as planned, it can feel not just frustrating but downright alarming. You tend to see the world in black and white, and sometimes that's incredibly helpful \u2014 it gives you a justice orientation, a clarity that other people envy. Other times it creates complications when you're dealing with nuanced topics where the answer isn't clean.\n\nYour strength is that you see patterns other people miss and you bring order where everyone else sees a mess. Your shadow is a fear of disruption. When something unexpected blows up the plan, it can send you into a tailspin. Part of your growth is learning that sometimes order has to contain a multitude \u2014 that the messiness of real life isn't a problem to be solved but a reality to be held."},"analyst":{"archetype":"Analyst","orientation":"thinking","coreDrive":"decoding systems","narrative":"You're the kind of person who loves it when everything is working like a well-oiled machine. You're fond of routine \u2014 not because you're boring, but because a well-structured routine is simply the best way to spend your day. And by the way, you do have an opinion on what the best way to spend your day is.\n\nYou're driven by a desire to understand what makes things work. Not in the abstract, existential way the Philosopher thinks about it \u2014 you want to understand the systems. How does supply and demand actually drive the economy? Why do people vote like they do? How is there a breakdown between what's actually true and what so many people tend to believe?\n\nThere's a real sense you carry that the world around you would be way better if people would simply lock in and care about efficiency and systems as much as you do. You're probably right about that, honestly.\n\nYour strength is problem-solving. When you're able to tap into that analytical brain and pair it with growing skills in communication, you can move people by telling stories with data and driving a team toward a goal with real clarity. Your shadow is social blind spots. Sometimes you're so focused on the system that you miss the signals in a conversation or a relationship. The human element isn't a variable to optimize \u2014 it's the whole point."},"connector":{"archetype":"Connector","orientation":"relating","coreDrive":"forming relationships","narrative":"From a young age, you've been someone who could sense when something was off with somebody. It's like you had this innate ability to just understand someone's emotions or draw out the things they were worried about. People come to you for advice \u2014 or really, just as a confidant. Someone they can trust with how they're actually feeling.\n\nYou don't just form relationships one-on-one. You bring people together \u2014 even people who might seem like they have nothing in common. You're so focused on the underlying value of the people around you that you see beauty and good in them even when others are stuck on surface-level disputes.\n\nThis means you've naturally built community everywhere you go. People are drawn to not only you but to each other because they sense something real is possible. You're an includer by nature. You haven't met someone you couldn't learn from or find common ground with.\n\nYour shadow is people-pleasing. You're so good at reading others that you easily pick up on their agendas and expectations. And that can make it genuinely hard to distinguish between what you actually want and what you think others want from you. Learning to know your own voice \u2014 separate from everyone else's \u2014 is one of the most important journeys you'll take."},"mobilizer":{"archetype":"Mobilizer","orientation":"relating","coreDrive":"rallying others toward a vision","narrative":"You're a dynamic, vision-driven leader. People are drawn to your charisma and your big ideas, and you love rallying them around a common goal. It's easy for you to see potential \u2014 in ideas and in people \u2014 that others can't see yet.\n\nOne of your favorite moments is watching someone click. That shift from disbelief about themselves to confidence about what they could achieve. You love to unlock that in people. You also find it natural to communicate what the future could look like in a way that makes other people want to be part of it.\n\nPeople describe you as a leader who takes a genuine interest in others in a way that makes them feel like they're part of something bigger than themselves. Your core strength is vision casting \u2014 seeing what could be and making it feel inevitable.\n\nYour shadow is impatience. Big ideas and great visions take a long time to see through. And you have to watch out for losing interest in something because of how long it's taking. Otherwise you'll leave behind a trail of things that had a great start and then fizzled out. The Mobilizer's growth edge is learning that the unglamorous middle of a long-term commitment is where the real leadership happens."},"creator":{"archetype":"Creator","orientation":"experiencing","coreDrive":"self-expression and beauty","narrative":"Your core drive is self-expression \u2014 making the world more beautiful, more honest, more felt. You can go to a dark place and see the beauty in sadness, in harder emotions that other people are uncomfortable with. You're constantly attracted to beautiful things \u2014 whether it's architecture, the way food is arranged on a plate, or a color palette that just works.\n\nEver since you were a kid, you've had an incredible imagination. Maybe you've lost touch with it a little, but when you really let yourself go there, you can imagine whole worlds, unique twists on everyday things. You've had more ideas than you can possibly count.\n\nYou prize the unique, the disruptive, the creative. You're frustrated by the ways the world tries to constrain you to the concepts of normal. Time, convention, other people's expectations \u2014 they all feel like cages.\n\nYou experience ups and downs that sometimes feel extreme to other people. But that's because you want to feel the fullness of an emotion \u2014 whether you're bursting with joy or sitting with heartbreak. People look at you with a little confusion about the way you treasure emotions. Your shadow is instability. That same sensitivity that makes you extraordinary can make the ordinary feel suffocating. Learning to create within constraints \u2014 not just in spite of them \u2014 is where your real power lives."}},"secondaryFlavorBlocks":{"philosopher":"Your Philosopher side means you're not content to just act \u2014 you need to understand why something matters before you can fully commit to it. You ask the deeper questions that other people in your position skip right past, and that makes your work richer. It also means you can get stuck in your head when the moment calls for movement.","explorer":"Your Explorer side pulls you toward new experiences and unfamiliar people. You get restless when things feel too predictable, and you bring a natural curiosity to everything you do. People around you feel more adventurous just being near you. The tension is that your need for novelty can pull you away from the thing you're building.","builder":"Your Builder side means you're not just a dreamer \u2014 you actually make things happen. When you commit to something, you drive it to completion. You have a craftsman's pride in work well done, and you're frustrated by people who talk about things without ever building them. That execution instinct grounds everything else about you.","organizer":"Your Organizer side gives you a natural sense for structure and systems. You see the chaos that other people overlook and you instinctively create order. Plans, processes, logistics \u2014 these aren't boring to you, they're satisfying. This makes you unusually reliable, but it can also make you rigid when life doesn't follow the plan.","analyst":"Your Analyst side means you're always asking how things work. You're not satisfied with surface explanations \u2014 you want to understand the system underneath. You catch inefficiencies that drive you crazy, and you have strong opinions about what the right answer is. This gives you real clarity, but it can make you impatient with people who don't see what you see.","connector":"Your Connector side means you're deeply attuned to the people around you. You sense what others are feeling before they say it, and you build trust quickly. Relationships aren't a nice-to-have for you \u2014 they're central to how you operate. The tension is that you can lose yourself in other people's needs and forget to tend to your own.","mobilizer":"Your Mobilizer side gives you a natural ability to inspire and lead. You see potential in people and ideas, and you have this instinct to rally others toward something bigger. People follow you because you make them feel capable. But that same energy can push you to move too fast for the people around you.","creator":"Your Creator side means you see beauty and possibility where others see the ordinary. You have a rich inner world and an instinct for self-expression that colors everything you do. You bring imagination and aesthetic sensibility to your work. The tension is that you can feel stifled by routine and structure, even when they're necessary."},"sectionIntros":{"pairing":"Your pairing is the combination of your two strongest drives. Your core type is who you are at your center \u2014 the thing that most defines how you see the world. Your secondary type is the other voice in the room \u2014 the one that colors how your core type shows up. Together, they create a tension and a richness that neither type has on its own.","coreType":"Your core type is your dominant drive \u2014 the lens you naturally see the world through. This isn\u2019t a label. It\u2019s a mirror. Read it and notice what feels true.","secondaryType":"Your secondary type is the other major force in your personality. It shapes how your core type expresses itself and often creates the internal tension you feel when two parts of you want different things.","tension":"Everyone carries a tension between different parts of who they are. Yours shows up in the pull between your primary and secondary type \u2014 two drives that don\u2019t always agree. This tension isn\u2019t a flaw. It\u2019s actually where most of your growth will come from.","shadow":"Your shadows are the blind spots that live on the other side of your strengths. Every strength, taken too far or left unexamined, creates a vulnerability. These aren\u2019t things to fix \u2014 they\u2019re things to know about yourself.","mindset":"One of the things we measure in this assessment is your growth mindset \u2014 your belief about whether people can fundamentally change. Decades of research show that what you believe about your own ability to grow has a massive impact on whether you actually do. Here\u2019s where you landed.","balanced":"Your top two types scored almost identically. That means you don\u2019t lean heavily in one direction \u2014 you carry both drives equally. This can feel like being pulled in two directions at once, but it\u2019s actually a sign of real range. You have access to two strong modes of operating, and your growth will come from learning when to lean into each one.","renaissance":"Your top three types are all within striking distance of each other. You\u2019re not easily categorized \u2014 and that\u2019s genuinely a strength. Renaissance profiles tend to be the most adaptable people in a room. The challenge is focus: with so many strong drives competing for your attention, choosing where to invest deeply matters more for you than for most people."},"tensionTemplates":{"action_vs_reflection":{"orientations":["doing","thinking"],"title":"Action vs. Reflection","content":"You live in the tension between doing and thinking. Part of you wants to move \u2014 to build, to execute, to make progress you can see and measure. The other part of you wants to pause and understand \u2014 to make sure the thing you're building is actually worth building. This tension can feel paralyzing when both sides pull hard at the same time. But here's what makes it powerful: when you act, it's grounded in real understanding. And when you think, it's not idle speculation \u2014 it's aimed at something you're going to build. Most people are strong at one or the other. You carry both. The key is learning when each mode serves you \u2014 and being honest about when you're using one to avoid the other."},"output_vs_people":{"orientations":["doing","relating"],"title":"Output vs. People","content":"You're pulled between getting things done and tending to the people around you. Part of you measures a good day by what you accomplished. The other part measures it by the quality of the conversations you had and whether the people in your life feel cared for. This is one of the most common tensions in leadership, and you carry it naturally. You'll have seasons where you lean hard into productivity and realize you've neglected relationships. And seasons where you invest deeply in people and feel behind on your work. Neither is wrong. The art is learning to hold both \u2014 to build things that serve people, and to invest in people who help you build."},"structure_vs_freedom":{"orientations":["doing","experiencing"],"title":"Structure vs. Freedom","content":"There's a war inside you between structure and freedom. One side of you craves order \u2014 plans, systems, predictability, the satisfaction of execution. The other side craves novelty \u2014 new experiences, creative expression, the thrill of something you've never tried. You probably frustrate people who are strong in one direction or the other, because you genuinely need both. Too much structure and you feel caged. Too much freedom and you feel untethered. Your growth edge is designing a life that gives you both \u2014 enough structure to be effective, enough freedom to stay alive."},"ideas_vs_relationships":{"orientations":["thinking","relating"],"title":"Ideas vs. Relationships","content":"You care deeply about ideas and deeply about people \u2014 and those two pulls don't always play nicely together. Your thinking side wants to go deep, to pursue truth regardless of where it leads or who it challenges. Your relational side wants to keep people close, to maintain harmony, to make sure nobody feels left behind. This tension shows up when you have a conviction that might make someone uncomfortable, or when you're in a conversation that matters relationally but isn't stimulating intellectually. Your gift is that you can think and feel at the same time. Your growth is learning when to prioritize which."},"depth_vs_breadth":{"orientations":["thinking","experiencing"],"title":"Depth vs. Breadth","content":"You're torn between going deep and going wide. Part of you wants to master something \u2014 to understand it completely, to know more about one thing than anyone else. The other part of you wants to taste everything \u2014 to explore, create, experience the full range of what's out there. You probably have a pattern of diving deep into something, then getting pulled away by the next fascinating thing. Or the reverse \u2014 staying on the surface of many things because you can't choose just one. The people who know you best are amazed at how much you know about how many things. Your challenge is finding the one or two areas where your depth and your breadth converge \u2014 and committing to those."},"community_vs_independence":{"orientations":["relating","experiencing"],"title":"Community vs. Independence","content":"You need people and you need freedom \u2014 and sometimes those feel like opposite things. Your relational side is deeply invested in community, in being known, in building something together with the people you love. Your experiencing side craves independence \u2014 the ability to go wherever curiosity takes you without being tethered to expectations. You've probably felt guilty about wanting space when people need you. Or lonely when you've chosen adventure over connection. This isn't a problem to solve. It's a rhythm to learn. The people who love you best are the ones who can hold space for both \u2014 who don't need you to choose between belonging and freedom."},"theory_vs_systems":{"orientations":["thinking","thinking"],"title":"Theory vs. Systems","content":"You think about thinking \u2014 and you think about how things work. One part of you is drawn to the big, abstract questions: meaning, truth, the human condition. The other part is drawn to how the world is actually structured: systems, patterns, what makes things efficient or broken. This is the tension between the philosopher and the engineer inside you. The philosopher asks why. The engineer asks how. When these two collaborate, you produce insights that are both profound and practical. When they compete, you can feel paralyzed \u2014 caught between wanting to understand everything and wanting to fix everything."},"vision_vs_execution":{"orientations":["doing","doing"],"title":"Vision vs. Execution","content":"You're a doer in two different directions. Part of you is about the big picture \u2014 making things real, bringing vision to life. The other part is about the details \u2014 order, systems, making sure everything runs smoothly. You might feel tension between wanting to create something new and wanting to perfect what already exists. Between building fast and building right. Your strength is that you can do both \u2014 you can see the vision and execute the plan. Your challenge is that you can become so focused on one mode that you neglect the other. The best version of you holds both: ambitious enough to dream and disciplined enough to deliver."},"depth_vs_breadth_relational":{"orientations":["relating","relating"],"title":"Depth vs. Breadth in Relationships","content":"You're deeply relational in two different ways. One side of you is drawn to individual people \u2014 deep conversation, genuine intimacy, the kind of friendship where someone really knows you. The other side is drawn to movements \u2014 groups, causes, rallying people around something bigger than themselves. You might notice yourself torn between investing deeply in a few people and casting a wider net. Between being a confidant and being a leader. Both are expressions of how much you care about people. Your growth is learning when to go deep and when to go wide \u2014 and trusting that you don't have to choose just one."},"inner_vs_outer":{"orientations":["experiencing","experiencing"],"title":"Inner World vs. Outer World","content":"You experience life intensely \u2014 both inside and out. One part of you is drawn inward: imagination, emotion, creative expression, the richness of your inner world. The other part is drawn outward: new places, new people, new experiences, the thrill of the unfamiliar. Sometimes your inner world is so vivid that external reality feels flat by comparison. Other times the outer world is so stimulating that you lose touch with the quiet voice inside. You're at your best when the two feed each other \u2014 when your experiences give your creativity material, and your creativity helps you see beauty in your experiences that other people miss."}},"shadowModifiers":{"vulnerability_high":"Feedback on your work can feel deeply personal \u2014 like a comment on who you are, not just what you did. That sensitivity is real, and it means you care. But learning to hold feedback without being crushed by it is one of the most important skills you'll develop.","vulnerability_low":"You have a natural resilience that helps you stay steady when things get chaotic. Most people around you are more shaken by setbacks than you are. That's a real strength \u2014 just make sure it doesn't keep you from acknowledging when something actually hurts.","selfDiscipline_high":"Follow-through comes naturally to you. When you commit to something, you finish it. That discipline is rare and people notice it. The thing to watch for is becoming so rigid in your routines that you miss opportunities that don't fit neatly into your plan.","selfDiscipline_low":"Starting things comes easily for you \u2014 the spark of a new idea, a new project, a new commitment. Finishing them is another story. You're not lazy. You're pulled by the next thing before the current thing is done. Learning to stay when it gets boring is your growth edge.","assertiveness_high":"You don't have trouble speaking up. Your voice carries weight in a room, and people look to you when a decision needs to be made. But you may need to learn when not to fill the silence \u2014 when the most powerful thing you can do is listen and let someone else lead.","assertiveness_low":"You tend to hold back when you have something to say. Not because you don't have an opinion \u2014 you do \u2014 but because you're weighing whether it's worth the conflict or the attention. Finding your voice, especially in rooms where it matters, is part of your journey.","gregariousness_high":"You draw energy from people. Social gatherings light you up, and you're often the one making sure nobody is standing alone. That's a gift. Just be honest with yourself about whether you sometimes use social energy to avoid the quiet work of self-reflection.","gregariousness_low":"You need solitude to recharge, and that's not a weakness. Your best thinking and most honest self-reflection happen when you're alone. The world will constantly tell you that more social is better. It's not. But don't let your need for alone time become a wall that keeps people out.","cooperation_high":"You're easy to work with and people appreciate your flexibility. But there's a version of cooperation that's actually conflict avoidance \u2014 going along with things you disagree with because the alternative feels too uncomfortable. Healthy disagreement is a skill worth building.","cooperation_low":"You have strong opinions and you're not afraid to push back. That directness is valuable \u2014 teams need someone willing to say the hard thing. But intensity without empathy can burn bridges. Learning to disagree without making people feel dismissed is your edge to sharpen.","selfConsciousness_high":"You're highly aware of how others perceive you, and that can make certain situations \u2014 public speaking, being the center of attention, putting your work out there \u2014 feel genuinely risky. This awareness can be refined into social intelligence, but only if you don't let it keep you from being seen.","selfConsciousness_low":"You're not easily embarrassed, and you're comfortable putting yourself out there. That confidence lets you take risks other people avoid. Make sure that ease doesn't make you blind to the moments when a little more self-awareness would serve you.","imagination_high":"Your inner world is vivid. You can imagine possibilities, scenarios, and creative solutions that other people simply can't see. That's a genuine superpower. The risk is that your imagination becomes an escape \u2014 a place to live instead of a tool to build with.","imagination_low":"You're practical and concrete in how you see the world. You deal with what's in front of you, not what might be. That groundedness is valuable \u2014 people count on your realism. Just be careful not to dismiss ideas too quickly because they don't seem immediately practical.","intellect_high":"You love abstract ideas. A great philosophical discussion or a theoretical framework genuinely excites you. That love of ideas gives you depth that most people your age don't have. Just remember that ideas without application can become a way of feeling smart without doing anything.","intellect_low":"You prefer the practical over the theoretical, and that's not a limitation \u2014 it's a strength. You're more interested in what works than in why it works. In a world full of people who overthink everything, your bias toward action is valuable.","artisticInterests_high":"You notice beauty that other people walk right past. A well-designed space, a perfect color combination, the way light hits a building \u2014 these things matter to you in a way that's hard to explain to people who don't see it. That sensitivity makes you extraordinary. It also makes ugly or careless environments genuinely draining.","artisticInterests_low":"You're not driven by aesthetics, and that frees you to focus on function. You care about whether something works, not whether it looks beautiful doing it. In a culture obsessed with image, that pragmatism is underrated.","orderliness_high":"You love structure. Lists, plans, organized spaces \u2014 they make you feel like the world makes sense. That instinct for order makes you incredibly reliable. Just watch for the moments when your need for structure becomes a need for control.","orderliness_low":"A little chaos doesn't bother you. You can function in ambiguity and disorder in a way that would stress most people out. That flexibility is a real advantage \u2014 especially in environments where things change fast. Just make sure important things don't slip through the cracks."},"growthMindsetClosings":{"high":"You already believe you can grow. That belief is the foundation for a beautiful life. The tension between your primary and secondary type \u2014 that push and pull you feel \u2014 is the engine. Not a problem to solve. The engine. The question for you isn\u2019t whether you can become more than you are right now. It\u2019s where you want to aim. You\u2019re standing at the beginning of a story that\u2019s going to surprise you. And the version of yourself on the other side of real investment, real formation, real community? That person is going to look back at this moment and be grateful you took the first step.","low":"You might be reading this and feeling like some of these things are just who you are. Fixed. Permanent. That\u2019s an honest way to feel. But the tension you carry between these two sides of yourself \u2014 that\u2019s not a sign that something is broken. It\u2019s a sign that there\u2019s more to discover. You don\u2019t have to have it figured out. You don\u2019t even have to believe you can change right now. You just have to be willing to stay open to one question: what if there\u2019s more? That willingness is enough to start.","mixed":"You sense there\u2019s more in you than what you\u2019ve seen so far. That instinct is right. The strengths, the shadows, the tensions \u2014 they\u2019re the starting point, not the ceiling. But becoming the person you were made to be doesn\u2019t happen by accident. It happens through investment. Self-knowledge. Real community. The kind of experience that challenges you in the right ways at the right time. You\u2019re not behind. You\u2019re at the beginning."},"leapYearBridge":"This assessment is just the beginning. It can show you clues about who you are and how you come alive \u2014 but even the best assessment can only scratch the surface. The real work of knowing yourself requires an examined life. It requires people who can walk alongside you, call out what they see in you, and challenge you to grow. That's what LeapYear is. A 12-month gap year experience in Austin, Texas where students like you invest in becoming the person they were made to be \u2014 through Career Design, Leadership Foundations, and Spiritual Formation. If any of this resonated with you, we'd love to talk."};

// State
let selectedPrimary = 'philosopher';
let selectedSecondary = 'explorer';
let selectedMindset = 'high';

const capitalize = s => s.charAt(0).toUpperCase() + s.slice(1);

// Build picker buttons
function buildPicker() {
  const pEl = document.getElementById('primary-btns');
  const sEl = document.getElementById('secondary-btns');
  const mEl = document.getElementById('mindset-btns');

  ARCHETYPES.forEach(a => {
    const pb = document.createElement('button');
    pb.className = 'picker-btn';
    pb.textContent = capitalize(a);
    pb.dataset.archetype = a;
    pb.addEventListener('click', () => {
      selectedPrimary = a;
      if (selectedSecondary === a) {
        selectedSecondary = ARCHETYPES.find(x => x !== a);
      }
      updatePicker();
      renderResult();
    });
    pEl.appendChild(pb);

    const sb = document.createElement('button');
    sb.className = 'picker-btn';
    sb.textContent = capitalize(a);
    sb.dataset.archetype = a;
    sb.addEventListener('click', () => {
      if (a === selectedPrimary) return;
      selectedSecondary = a;
      updatePicker();
      renderResult();
    });
    sEl.appendChild(sb);
  });

  ['high','mixed','low'].forEach(m => {
    const mb = document.createElement('button');
    mb.className = 'picker-btn';
    mb.textContent = capitalize(m);
    mb.dataset.mindset = m;
    mb.addEventListener('click', () => {
      selectedMindset = m;
      updatePicker();
      renderResult();
    });
    mEl.appendChild(mb);
  });

  document.getElementById('toggle-balanced').addEventListener('change', () => renderResult());
  document.getElementById('toggle-renaissance').addEventListener('change', () => renderResult());
}

function updatePicker() {
  document.querySelectorAll('#primary-btns .picker-btn').forEach(b => {
    b.classList.toggle('active-primary', b.dataset.archetype === selectedPrimary);
  });
  document.querySelectorAll('#secondary-btns .picker-btn').forEach(b => {
    b.classList.toggle('active-secondary', b.dataset.archetype === selectedSecondary);
    b.disabled = b.dataset.archetype === selectedPrimary;
  });
  document.querySelectorAll('#mindset-btns .picker-btn').forEach(b => {
    b.classList.toggle('active-primary', b.dataset.mindset === selectedMindset);
  });
}

function renderResult() {
  const p = selectedPrimary;
  const s = selectedSecondary;
  const isBalanced = document.getElementById('toggle-balanced').checked;
  const isRenaissance = document.getElementById('toggle-renaissance').checked;
  const tensionKey = getTension(p, s);
  const tension = C.tensionTemplates[tensionKey];
  const shadows = SAMPLE_SHADOWS[p] || ['vulnerability_high','assertiveness_low'];

  let html = '';

  // Hero
  html += `<div class="results-hero">
    <div class="result-label">Your Pairing</div>
    <div class="result-type">${capitalize(p)} &mdash; ${capitalize(s)}</div>
  </div>`;

  html += `<div class="results-content">`;

  // Pairing intro
  html += `<div class="result-section">
    <p class="section-intro">${C.sectionIntros.pairing}</p>`;

  // Balanced / Renaissance flags
  if (isRenaissance) {
    html += `<div class="result-flag-block">
      <h3>Renaissance Profile</h3>
      <p>${C.sectionIntros.renaissance}</p>
    </div>`;
  } else if (isBalanced) {
    html += `<div class="result-flag-block">
      <h3>Balanced Profile</h3>
      <p>${C.sectionIntros.balanced}</p>
    </div>`;
  }
  html += `</div>`;

  // Core Type
  const pNarr = C.primaryNarratives[p];
  html += `<div class="result-section">
    <div class="separator"></div>
    <h2>Core Type: The ${capitalize(p)}</h2>
    <p class="section-intro">${C.sectionIntros.coreType}</p>
    <div class="narrative">${pNarr.narrative.split('\n\n').map(x => `<p>${x}</p>`).join('')}</div>
  </div>`;

  // Secondary Type
  html += `<div class="result-section">
    <div class="separator"></div>
    <h2>Secondary Type: The ${capitalize(s)}</h2>
    <p class="section-intro">${C.sectionIntros.secondaryType}</p>
    <p>${C.secondaryFlavorBlocks[s]}</p>
  </div>`;

  // Tension
  if (tension) {
    html += `<div class="result-section">
      <div class="separator"></div>
      <h2>Your Tension: ${tension.title}</h2>
      <p class="section-intro">${C.sectionIntros.tension}</p>
      <p>${tension.content}</p>
    </div>`;
  }

  // Shadows
  html += `<div class="result-section">
    <div class="separator"></div>
    <h2>Your Shadows</h2>
    <p class="section-intro">${C.sectionIntros.shadow}</p>
    <div class="narrative">`;
  shadows.forEach(sh => {
    if (C.shadowModifiers[sh]) {
      html += `<p>${C.shadowModifiers[sh]}</p>`;
    }
  });
  html += `</div></div>`;

  // Your Mindset
  const mindsetLabels = { high: 'Growth', low: 'Fixed', mixed: 'Mixed' };
  html += `<div class="result-section">
    <div class="separator"></div>
    <h2>Your Mindset</h2>
    <p class="section-intro">${C.sectionIntros.mindset}</p>
    <div class="mindset-indicator">
      <span class="mindset-label">${mindsetLabels[selectedMindset]} Mindset</span>
    </div>
    <p>${C.growthMindsetClosings[selectedMindset]}</p>
  </div>`;

  // Bridge
  html += `<div class="result-bridge">
    <h2>What Comes Next</h2>
    <p>${C.leapYearBridge}</p>
  </div>`;

  // All pairings grid
  html += `</div>`;
  html += `<div class="all-pairings">
    <div class="separator"></div>
    <h2>All 56 Pairings</h2>
    <p class="subtitle">Click any pairing to preview its full result.</p>
    <div class="pairing-grid">`;

  ARCHETYPES.forEach(primary => {
    ARCHETYPES.forEach(secondary => {
      if (primary === secondary) return;
      const isActive = primary === p && secondary === s;
      html += `<div class="pairing-card" onclick="selectPairing('${primary}','${secondary}')" style="${isActive ? 'border-color: var(--ly-flame);' : ''}">
        <div class="pairing-name">${capitalize(primary)} &mdash; ${capitalize(secondary)}</div>
        <div class="pairing-drives">${C.primaryNarratives[primary].coreDrive} + ${C.primaryNarratives[secondary].coreDrive}</div>
      </div>`;
    });
  });

  html += `</div></div>`;

  document.getElementById('result-display').innerHTML = html;
}

function selectPairing(p, s) {
  selectedPrimary = p;
  selectedSecondary = s;
  updatePicker();
  renderResult();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
buildPicker();
updatePicker();
renderResult();
</script>
</body>
</html>
